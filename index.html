<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A game to give Popeye spinach but not poison in a limited time"
    />
    <meta name="author" content="Hyunji Lee" />
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
    <title>Popeye Game</title>
    <script
      src="https://kit.fontawesome.com/0ce04dd2fb.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <!-- Playground -->
    <main class="container playground">
      <!-- Progress -->
      <section class="container playground__progress">
        <button class="btn playground__btn">
          <i class="fa-solid fa-play"></i>
          Start
        </button>
        <div class="playground__timer">
          <span class="timer__number">00:00</span>
          <div class="timer__bar">
            <div class="timer__bar-value"></div>
          </div>
        </div>
      </section>

      <!-- Plate -->
      <section class="container playground__plate">
        <img src="images/plate.png" alt="plate" class="plate__img" />
      </section>
    </main>

    <!-- Status -->
    <aside class="container status">
      <header class="status__header">Popeye the Sailor</header>
      <div class="status__popeye">
        <img
          src="images/default.png"
          alt="default"
          class="popeye__img status__default"
        />
      </div>
    </aside>

    <!-- Pop-up -->
    <section class="container pop-up">
      <p class="pop-up__message">💪 I GOT STRONG 💪</p>
      <div class="pop-up__btns">
        <button class="btn pop-up__btn pop-up__replay">
          <i class="fa-solid fa-arrow-rotate-left"></i> Replay
        </button>
        <button class="btn pop-up__btn pop-up__stop">
          <i class="fa-solid fa-xmark"></i> Cancel
        </button>
      </div>
    </section>
  </body>
</html>
